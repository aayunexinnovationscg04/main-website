<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | AAYUNEX Innovations</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-content h1 {
            font-size: 6rem;
            margin: 0;
            color: #ffc107;
        }
        .error-content h2 {
            font-size: 2rem;
            margin: 1rem 0;
        }
        .error-content p {
            font-size: 1.1rem;
            margin: 1rem 0 2rem;
            color: #666;
        }
        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1>500</h1>
            <h2>Internal Server Error</h2>
            <p>Something went wrong on our end. Please try again later.</p>
            <a href="/" class="btn-home">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
